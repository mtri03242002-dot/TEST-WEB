<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>My Insta</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to right, #87CEEB, #bde0fe);
  transition: 0.3s;
}

/* TASKBAR */
.taskbar {
  position: sticky;
  top: 0;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.6);
  display: flex;
  justify-content: space-between;
  padding: 12px 20px;
  z-index: 1000;
}

.actions {
  display: flex;
  gap: 10px;
}

.uploadBtn, .settingBtn {
  background: #4da6ff;
  color: white;
  padding: 10px;
  border-radius: 50%;
  cursor: pointer;
}

/* OVERLAY */
#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  z-index: 999;
}

.hidden {
  display: none;
}

/* POPUP */
#popup {
  position: fixed;
  bottom: -100%;
  left: 0;
  width: 100%;
  background: white;
  border-radius: 20px 20px 0 0;
  padding: 20px;
  transition: 0.3s;
  z-index: 1001;
}

#popup.show {
  bottom: 0;
}

.handle {
  width: 40px;
  height: 5px;
  background: #ccc;
  border-radius: 10px;
  margin: auto;
  margin-bottom: 10px;
}

#popup img {
  width: 100%;
  max-height: 250px;
  object-fit: contain;
}

/* SETTING */
#settingPanel {
  position: fixed;
  top: 60px;
  right: 20px;
  background: white;
  padding: 15px;
  border-radius: 12px;
  z-index: 1002;
}

/* FEED */
#feed {
  padding: 20px;
}

.post {
  background: white;
  border-radius: 12px;
  margin-bottom: 20px;
  overflow: hidden;
  position: relative;
}

.post img {
  width: 100%;
  object-fit: contain;
  background: #f0f0f0;
}

.post p {
  padding: 10px;
}

.deleteBtn {
  position: absolute;
  top: 10px;
  right: 10px;
  background: red;
  color: white;
  border: none;
  padding: 5px 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="taskbar">
  <h2>📸 My Insta</h2>

  <div class="actions">
    <label class="uploadBtn">
      <i class="fa-solid fa-plus"></i>
      <input type="file" id="upload" multiple hidden>
    </label>

    <button class="settingBtn" onclick="toggleSetting()">
      <i class="fa-solid fa-gear"></i>
    </button>
  </div>
</div>

<!-- SETTING -->
<div id="settingPanel" class="hidden">
  <p>🎨 Màu nền</p>
  <input type="color" id="colorPicker">

  <p>🖼️ Size ảnh</p>
  <input type="range" id="sizeRange" min="150" max="350">
</div>

<!-- OVERLAY -->
<div id="overlay" class="hidden" onclick="closePreview()"></div>

<!-- POPUP -->
<div id="popup">
  <div class="handle"></div>
  <img id="previewImg">
  <input type="text" id="caption" placeholder="Caption (áp dụng cho tất cả ảnh)">
  <div>
    <button onclick="confirmPost()">Đăng tất cả</button>
    <button onclick="closePreview()">Hủy</button>
  </div>
</div>

<div id="feed"></div>

<script>
let posts = JSON.parse(localStorage.getItem("posts")) || [];
let settings = JSON.parse(localStorage.getItem("settings")) || {
  color: "#87CEEB",
  size: 200
};

let selectedImages = [];

// APPLY SETTING
document.body.style.background = settings.color;
document.getElementById("sizeRange").value = settings.size;
document.getElementById("colorPicker").value = settings.color;

// RENDER
function render() {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  posts.forEach((p, i) => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <button class="deleteBtn" onclick="deletePost(${i})">X</button>
      <img src="${p.img}" style="height:${settings.size}px">
      <p>${p.caption}</p>
    `;

    feed.appendChild(div);
  });
}
render();

// UPLOAD MULTIPLE
document.getElementById("upload").addEventListener("change", function () {
  selectedImages = [];
  const files = this.files;

  if (!files.length) return;

  Array.from(files).forEach(file => {
    const reader = new FileReader();

    reader.onload = function (e) {
      selectedImages.push(e.target.result);

      // preview ảnh đầu tiên
      document.getElementById("previewImg").src = selectedImages[0];
    };

    reader.readAsDataURL(file);
  });

  document.getElementById("popup").classList.add("show");
  document.getElementById("overlay").classList.remove("hidden");
});

// POST MULTIPLE
function confirmPost() {
  const caption = document.getElementById("caption").value;

  if (!selectedImages.length) return alert("Chưa chọn ảnh");

  selectedImages.forEach(img => {
    posts.unshift({ img, caption });
  });

  localStorage.setItem("posts", JSON.stringify(posts));

  closePreview();
  render();
}

// DELETE
function deletePost(i) {
  posts.splice(i, 1);
  localStorage.setItem("posts", JSON.stringify(posts));
  render();
}

// CLOSE
function closePreview() {
  document.getElementById("popup").classList.remove("show");
  document.getElementById("overlay").classList.add("hidden");

  document.getElementById("caption").value = "";
  document.getElementById("upload").value = "";
  document.getElementById("previewImg").src = "";
  selectedImages = [];
}

// SETTING
function toggleSetting() {
  document.getElementById("settingPanel").classList.toggle("hidden");
}

// CHANGE COLOR
document.getElementById("colorPicker").addEventListener("input", function() {
  settings.color = this.value;
  document.body.style.background = settings.color;
  localStorage.setItem("settings", JSON.stringify(settings));
});

// CHANGE SIZE
document.getElementById("sizeRange").addEventListener("input", function() {
  settings.size = this.value;
  localStorage.setItem("settings", JSON.stringify(settings));
  render();
});
</script>

</body>
</html>

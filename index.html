<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>My Insta</title>

<!-- ICON (Font Awesome) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to right, #87CEEB, #bde0fe);
  transition: 0.3s;
}

/* TASKBAR */
.taskbar {
  position: sticky;
  top: 0;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.6);
  display: flex;
  justify-content: space-between;
  padding: 12px 20px;
  z-index: 1000;
}

.actions {
  display: flex;
  gap: 10px;
  align-items: center;
}

.uploadBtn, .settingBtn {
  background: #4da6ff;
  color: white;
  padding: 10px;
  border-radius: 50%;
  cursor: pointer;
}

/* OVERLAY */
#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  z-index: 999;
}

.hidden {
  display: none;
}

/* POPUP */
#popup {
  position: fixed;
  bottom: -100%;
  left: 0;
  width: 100%;
  background: white;
  border-radius: 20px 20px 0 0;
  padding: 20px;
  transition: 0.3s;
  z-index: 1001; /* 🔥 FIX: luôn nằm trên */
}

#popup.show {
  bottom: 0;
}

.handle {
  width: 40px;
  height: 5px;
  background: #ccc;
  border-radius: 10px;
  margin: auto;
  margin-bottom: 10px;
}

#popup img {
  width: 100%;
  max-height: 300px;
  object-fit: contain;
  border-radius: 10px;
}

/* SETTING PANEL */
#settingPanel {
  position: fixed;
  top: 60px;
  right: 20px;
  background: white;
  padding: 15px;
  border-radius: 12px;
  z-index: 1002;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* FEED */
#feed {
  padding: 20px;
}

.post {
  background: white;
  border-radius: 12px;
  margin-bottom: 20px;
  overflow: hidden;
  position: relative;
}

.post img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

.post p {
  padding: 10px;
}

.deleteBtn {
  position: absolute;
  top: 10px;
  right: 10px;
  background: red;
  color: white;
  border: none;
  padding: 5px 8px;
  cursor: pointer;
  border-radius: 5px;
}
</style>
</head>

<body>

<!-- TASKBAR -->
<div class="taskbar">
  <h2>📸 My Insta</h2>

  <div class="actions">
    <label class="uploadBtn">
      <i class="fa-solid fa-plus"></i>
      <input type="file" id="upload" hidden>
    </label>

    <button class="settingBtn" onclick="toggleSetting()">
      <i class="fa-solid fa-gear"></i>
    </button>
  </div>
</div>

<!-- SETTING -->
<div id="settingPanel" class="hidden">
  <p>🎨 Màu nền</p>
  <input type="color" onchange="changeColor(this.value)">

  <p>🖼️ Size ảnh</p>
  <input type="range" min="150" max="400" value="250" onchange="changeSize(this.value)">
</div>

<!-- OVERLAY -->
<div id="overlay" class="hidden" onclick="closePreview()"></div>

<!-- POPUP -->
<div id="popup">
  <div class="handle"></div>
  <img id="previewImg">
  <input type="text" id="caption" placeholder="Viết caption...">
  <div class="btns">
    <button onclick="confirmPost()">Đăng</button>
    <button onclick="closePreview()">Hủy</button>
  </div>
</div>

<!-- FEED -->
<div id="feed"></div>

<script>
let posts = JSON.parse(localStorage.getItem("posts")) || [];
let currentImage = "";
let imgSize = 250;

// render
function render() {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  posts.forEach((p, index) => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <button class="deleteBtn" onclick="deletePost(${index})">X</button>
      <img src="${p.img}" style="height:${imgSize}px">
      <p>${p.caption}</p>
    `;

    feed.appendChild(div);
  });
}
render();

// upload
document.getElementById("upload").addEventListener("change", function () {
  const file = this.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function (e) {
    currentImage = e.target.result;
    document.getElementById("previewImg").src = currentImage;

    document.getElementById("popup").classList.add("show");
    document.getElementById("overlay").classList.remove("hidden");
  };

  reader.readAsDataURL(file);
});

// đăng
function confirmPost() {
  const caption = document.getElementById("caption").value;

  if (!currentImage) return alert("Chưa chọn ảnh!");

  posts.unshift({ img: currentImage, caption });
  localStorage.setItem("posts", JSON.stringify(posts));

  closePreview();
  render();
}

// xoá
function deletePost(i) {
  posts.splice(i, 1);
  localStorage.setItem("posts", JSON.stringify(posts));
  render();
}

// đóng popup
function closePreview() {
  document.getElementById("popup").classList.remove("show");
  document.getElementById("overlay").classList.add("hidden");
  document.getElementById("caption").value = "";
  document.getElementById("upload").value = "";
  document.getElementById("previewImg").src = "";
  currentImage = "";
}

// setting
function toggleSetting() {
  document.getElementById("settingPanel").classList.toggle("hidden");
}

function changeColor(color) {
  document.body.style.background = color;
}

function changeSize(size) {
  imgSize = size;
  render();
}
</script>

</body>
</html>

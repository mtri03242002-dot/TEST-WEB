<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>My Insta</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body { margin:0; font-family:Arial; background:#87CEEB; }

.taskbar {
  position: sticky; top:0;
  display:flex; justify-content:space-between;
  padding:12px 20px;
  background:rgba(255,255,255,0.6);
  z-index:1000;
}

.actions { display:flex; gap:10px; }

.uploadBtn, .settingBtn {
  background:#4da6ff; color:white;
  padding:10px; border-radius:50%;
  cursor:pointer;
}

/* FEED */
#feed {
  column-count: 3;
  column-gap: 10px;
  padding: 10px;
}

.post {
  break-inside: avoid;
  margin-bottom: 10px;
  background: white;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}

.post img {
  width: 100%;
  height: auto;
}

.caption { padding:8px; }

/* DELETE */
.deleteBtn {
  position:absolute; top:5px; right:5px;
  background:red; color:white; border:none;
  cursor:pointer;
}

/* POPUP */
#overlay {
  position:fixed; top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  z-index:2000;
}

#popup {
  position:fixed; bottom:-100%;
  width:100%;
  background:white;
  padding:20px;
  transition:0.3s;
  z-index:2001;
}

#popup.show { bottom:0; }

.hidden { display:none; }

#popup img {
  width:100%;
  max-height:250px;
  object-fit:contain;
}

#popup input {
  width:95%;
  padding:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="taskbar">
  <h2>📸 My Insta</h2>

  <div class="actions">
    <label class="uploadBtn">
      <i class="fa-solid fa-plus"></i>
      <input type="file" id="upload" multiple hidden>
    </label>
  </div>
</div>

<div id="overlay" class="hidden" onclick="closePreview()"></div>

<div id="popup">
  <img id="previewImg">
  <input type="text" id="caption" placeholder="Caption...">
  <br><br>
  <button onclick="confirmPost()">Đăng</button>
  <button onclick="closePreview()">Hủy</button>
</div>

<div id="feed"></div>

<script>
let posts = JSON.parse(localStorage.getItem("posts")) || [];
let selectedImages = [];

// render
function render() {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  posts.forEach((p,i) => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <button class="deleteBtn" onclick="deletePost(${i})">X</button>
      <img src="${p.img}">
      <div class="caption">${p.caption || ""}</div>
    `;

    feed.appendChild(div);
  });
}
render();

// 🔥 FIX ĐĂNG NHIỀU ẢNH
document.getElementById("upload").addEventListener("change", async function () {
  const files = Array.from(this.files);
  if (!files.length) return;

  selectedImages = [];

  await Promise.all(files.map(file => {
    return new Promise(resolve => {
      const reader = new FileReader();

      reader.onload = function (e) {
        selectedImages.push(e.target.result);
        resolve();
      };

      reader.readAsDataURL(file);
    });
  }));

  document.getElementById("previewImg").src = selectedImages[0];

  document.getElementById("popup").classList.add("show");
  document.getElementById("overlay").classList.remove("hidden");
});

// đăng
function confirmPost() {
  const caption = document.getElementById("caption").value;

  selectedImages.forEach(img => {
    posts.unshift({ img, caption });
  });

  localStorage.setItem("posts", JSON.stringify(posts));

  closePreview();
  render();
}

// xoá
function deletePost(i) {
  posts.splice(i,1);
  localStorage.setItem("posts", JSON.stringify(posts));
  render();
}

// đóng
function closePreview() {
  document.getElementById("popup").classList.remove("show");
  document.getElementById("overlay").classList.add("hidden");

  document.getElementById("upload").value = "";
  document.getElementById("caption").value = "";
  document.getElementById("previewImg").src = "";

  selectedImages = [];
}
</script>

</body>
</html>

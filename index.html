<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>My Insta</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #87CEEB;
}

/* TASKBAR */
.taskbar {
  position: sticky;
  top: 0;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.6);
  display: flex;
  justify-content: space-between;
  padding: 12px 20px;
  z-index: 1000;
}

.actions {
  display: flex;
  gap: 10px;
}

.uploadBtn, .settingBtn {
  background: #4da6ff;
  color: white;
  padding: 10px;
  border-radius: 50%;
  cursor: pointer;
}

/* FEED GRID */
#feed {
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 15px;
}

/* POST */
.post {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  position: relative;
}

.post img {
  width: 100%;
  aspect-ratio: 1/1;
  object-fit: cover;
}

/* DELETE */
.deleteBtn {
  position: absolute;
  top: 5px;
  right: 5px;
  background: red;
  color: white;
  border: none;
  cursor: pointer;
}

/* POPUP */
#overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  top: 0;
  left: 0;
  z-index: 999;
}

#popup {
  position: fixed;
  bottom: -100%;
  width: 100%;
  background: white;
  padding: 20px;
  border-radius: 20px 20px 0 0;
  transition: 0.3s;
  z-index: 1001;
}

#popup.show {
  bottom: 0;
}

.hidden {
  display: none;
}

/* SETTING */
#settingPanel {
  position: fixed;
  top: 60px;
  right: 20px;
  background: white;
  padding: 10px;
  border-radius: 10px;
  z-index: 1002;
}
</style>
</head>

<body>

<div class="taskbar">
  <h2>📸 My Insta</h2>

  <div class="actions">
    <label class="uploadBtn">
      <i class="fa-solid fa-plus"></i>
      <input type="file" id="upload" multiple hidden>
    </label>

    <button class="settingBtn" onclick="toggleSetting()">
      <i class="fa-solid fa-gear"></i>
    </button>
  </div>
</div>

<div id="settingPanel" class="hidden">
  <p>🎨 Màu nền</p>
  <input type="color" id="colorPicker">
</div>

<div id="overlay" class="hidden" onclick="closePreview()"></div>

<div id="popup">
  <img id="previewImg" style="width:100%">
  <input type="text" id="caption" placeholder="Caption">
  <button onclick="confirmPost()">Đăng</button>
</div>

<div id="feed"></div>

<script>
let posts = JSON.parse(localStorage.getItem("posts")) || [];
let settings = JSON.parse(localStorage.getItem("settings")) || {
  color: "#87CEEB"
};

let selectedImages = [];

// APPLY SETTING
document.body.style.background = settings.color;
document.getElementById("colorPicker").value = settings.color;

// RENDER
function render() {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  posts.forEach((p, i) => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <button class="deleteBtn" onclick="deletePost(${i})">X</button>
      <img src="${p.img}">
    `;

    feed.appendChild(div);
  });
}
render();

// UPLOAD
document.getElementById("upload").addEventListener("change", function () {
  selectedImages = [];
  const files = this.files;

  Array.from(files).forEach(file => {
    const reader = new FileReader();

    reader.onload = function (e) {
      selectedImages.push(e.target.result);
      document.getElementById("previewImg").src = selectedImages[0];
    };

    reader.readAsDataURL(file);
  });

  document.getElementById("popup").classList.add("show");
  document.getElementById("overlay").classList.remove("hidden");
});

// POST
function confirmPost() {
  selectedImages.forEach(img => {
    posts.unshift({ img });
  });

  localStorage.setItem("posts", JSON.stringify(posts));
  closePreview();
  render();
}

// DELETE
function deletePost(i) {
  posts.splice(i, 1);
  localStorage.setItem("posts", JSON.stringify(posts));
  render();
}

// CLOSE
function closePreview() {
  document.getElementById("popup").classList.remove("show");
  document.getElementById("overlay").classList.add("hidden");
  document.getElementById("upload").value = "";
  selectedImages = [];
}

// SETTING
function toggleSetting() {
  document.getElementById("settingPanel").classList.toggle("hidden");
}

document.getElementById("colorPicker").addEventListener("input", function() {
  settings.color = this.value;
  document.body.style.background = settings.color;
  localStorage.setItem("settings", JSON.stringify(settings));
});
</script>

</body>
</html>

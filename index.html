<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Mini Game Center</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(to right, #74ebd5, #9face6);
  margin: 0;
}

h1 {
  margin-top: 20px;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
  padding: 20px;
}

.box {
  background: white;
  padding: 20px;
  border-radius: 12px;
}

button {
  padding: 10px;
  margin-top: 10px;
  cursor: pointer;
}

input {
  padding: 8px;
}
</style>
</head>

<body>

<h1>🎮 Mini Game Center</h1>

<div class="container">

<!-- GAME 1 -->
<div class="box">
  <h3>🎯 Đoán số (1–100)</h3>
  <input type="number" id="guess">
  <br>
  <button onclick="checkGuess()">Đoán</button>
  <p id="result"></p>
</div>

<!-- GAME 2 -->
<div class="box">
  <h3>😂 Random câu nói</h3>
  <button onclick="randomQuote()">Random</button>
  <p id="quote"></p>
</div>

<!-- GAME 3 -->
<div class="box">
  <h3>🎲 Quay số may mắn</h3>
  <button onclick="spin()">Quay</button>
  <p id="spinResult"></p>
</div>

<!-- GAME 4 -->
<div class="box">
  <h3>🧠 Test vận may</h3>
  <button onclick="luck()">Test</button>
  <p id="luckResult"></p>
</div>

</div>

<script>
// GAME 1
let number = Math.floor(Math.random()*100)+1;

function checkGuess() {
  let guess = document.getElementById("guess").value;

  if (guess == number) {
    document.getElementById("result").innerText = "🎉 Đúng rồi!";
  } else if (guess > number) {
    document.getElementById("result").innerText = "📉 Quá lớn!";
  } else {
    document.getElementById("result").innerText = "📈 Quá nhỏ!";
  }
}

// GAME 2
const quotes = [
  "Đừng lười nữa 😅",
  "Ngủ đi mai tính 😂",
  "Crush chưa rep đâu 😭",
  "Tiền không tự sinh ra đâu 🤡",
  "Học đi bro 📚"
];

function randomQuote() {
  let q = quotes[Math.floor(Math.random()*quotes.length)];
  document.getElementById("quote").innerText = q;
}

// GAME 3
function spin() {
  let n = Math.floor(Math.random()*100);
  document.getElementById("spinResult").innerText = "🎯 Số của bạn: " + n;
}

// GAME 4
function luck() {
  let arr = ["🔥 Siêu may mắn", "🙂 Bình thường", "💀 Xui vl"];
  let r = arr[Math.floor(Math.random()*arr.length)];
  document.getElementById("luckResult").innerText = r;
}
</script>

</body>
</html>

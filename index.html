<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>My Insta</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TASKBAR -->
<div class="taskbar">
  <h2>📸 My Insta</h2>

  <div class="actions">
    <label class="uploadBtn">
      ➕
      <input type="file" id="upload" hidden>
    </label>

    <button onclick="toggleDark()">🌙</button>
  </div>
</div>

<!-- POPUP PREVIEW -->
<div id="previewBox" class="hidden" onclick="outsideClick(event)">
  <div class="previewContent">
    <img id="previewImg">
    <input type="text" id="caption" placeholder="Viết caption...">
    <div class="btns">
      <button onclick="confirmPost()">Đăng</button>
      <button onclick="closePreview()">Hủy</button>
    </div>
  </div>
</div>

<!-- FEED -->
<div id="feed"></div>

<script src="script.js"></script>
</body>
</html>
